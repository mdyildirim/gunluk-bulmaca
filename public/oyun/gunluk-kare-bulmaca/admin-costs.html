<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Günlük Kare Bulmaca — LLM Maliyetleri</title>
<style>
  :root{--accent:#b3122b;--ink:#1a1a1a;--muted:#6b6b6b;--line:#d0ccc2;--bg:#f4f1ea;
        --ok:#2b8a3e;--err:#e03131;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);padding:18px;}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;}
  h1{font-size:20px;margin:0 0 4px;}
  h2{font-size:14px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .sub{color:var(--muted);font-size:13px;}
  a{color:var(--accent);}
  .nav-link{display:inline-flex;align-items:center;min-height:34px;padding:8px 13px;border:1px solid var(--line);
    border-radius:6px;background:#fff;color:var(--ink);font-size:13px;text-decoration:none;white-space:nowrap;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:16px;}
  .filters{display:grid;grid-template-columns:1fr;gap:10px;align-items:end;}
  @media(min-width:720px){.filters{grid-template-columns:180px 180px auto;}.summary{grid-template-columns:repeat(2,minmax(0,1fr));}}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 3px;}
  input[type=date]{width:100%;padding:8px;border:1px solid var(--line);border-radius:6px;font-family:var(--sans);font-size:14px;background:#fff;}
  button{font-size:13px;padding:8px 13px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button:hover,.nav-link:hover{filter:brightness(.97);}
  .btns{display:flex;flex-wrap:wrap;gap:8px;}
  .summary{display:grid;grid-template-columns:1fr;gap:16px;}
  .metric{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;}
  .metric .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .metric .value{font-size:28px;font-weight:700;line-height:1.15;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:top;}
  th{color:var(--muted);font-size:12px;font-weight:600;}
  td.money,th.money{text-align:right;font-variant-numeric:tabular-nums;}
  .pill{display:inline-flex;align-items:center;font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--line);}
  .pill.ok{background:#edf8f0;color:var(--ok);}
  .pill.err{background:#fff1f1;color:var(--err);}
  .status{min-height:18px;margin-bottom:12px;color:var(--muted);font-size:13px;}
  .table-wrap{overflow-x:auto;}
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>LLM Maliyetleri</h1>
      <div class="sub">Sadece toplam maliyet tutarları gösterilir.</div>
    </div>
    <a class="nav-link" href="./admin.html">Editör</a>
  </div>

  <section class="card">
    <h2>Filtre</h2>
    <form id="filterForm" class="filters">
      <div><label>Başlangıç</label><input type="date" id="fromDate"></div>
      <div><label>Bitiş</label><input type="date" id="toDate"></div>
      <div class="btns">
        <button class="primary" type="submit">Filtrele</button>
        <button type="button" id="resetBtn">Sıfırla</button>
      </div>
    </form>
  </section>

  <div id="status" class="status">Yükleniyor...</div>

  <section class="summary">
    <div class="metric">
      <div class="label">Toplam maliyet</div>
      <div id="totalCost" class="value">$0.000000</div>
    </div>
    <div class="metric">
      <div class="label">Analiz sayısı</div>
      <div id="analysisCount" class="value">0</div>
    </div>
  </section>

  <section class="card" style="margin-top:16px">
    <h2>Günlük toplam</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Tarih</th><th>Analiz</th><th class="money">Toplam maliyet</th></tr></thead>
        <tbody id="dailyRows"><tr><td class="sub" colspan="3">Kayıt yok.</td></tr></tbody>
      </table>
    </div>
  </section>

  <section class="card">
    <h2>Kayıtlar</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Zaman</th><th>Model</th><th>Durum</th><th class="money">Toplam maliyet</th></tr></thead>
        <tbody id="entryRows"><tr><td class="sub" colspan="4">Kayıt yok.</td></tr></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="./admin-costs.js"></script>
</body>
</html>
