<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Günlük Kare Bulmaca — Editör</title>
<style>
  :root{--accent:#b3122b;--ink:#1a1a1a;--muted:#6b6b6b;--line:#d0ccc2;--bg:#f4f1ea;
        --ok:#2b8a3e;--warn:#e8a317;--err:#e03131;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);padding:18px;}
  h1{font-size:20px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  .grid2{display:grid;grid-template-columns:1fr;gap:20px;}
  @media(min-width:900px){.grid2{grid-template-columns:380px 1fr;align-items:start;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:16px;}
  .card h2{font-size:14px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px;}
  input[type=text],input[type=date],input[type=number],textarea{width:100%;padding:8px;border:1px solid var(--line);
    border-radius:6px;font-family:var(--sans);font-size:14px;background:#fff;}
  textarea#grid{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:18px;line-height:1.5;
    letter-spacing:6px;text-transform:uppercase;min-height:160px;white-space:pre;}
  .row{display:flex;gap:10px;}.row>div{flex:1;}
  button{font-size:13px;padding:8px 13px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.danger{border-color:#e6b4be;background:#fff7f8;color:var(--accent);}
  button.small{padding:5px 9px;font-size:12px;}
  button:disabled{opacity:.55;cursor:not-allowed;}
  button:hover{filter:brightness(.97);}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .preview-grid{display:grid;gap:1px;background:#1a1a1a;border:2px solid #1a1a1a;width:max-content;max-width:100%;position:relative;}
  .pc{width:26px;height:26px;background:#fff;position:relative;display:flex;align-items:center;justify-content:center;
    font-family:Georgia,serif;font-weight:600;font-size:14px;z-index:1;}
  .pc.b{background:#1a1a1a;}
  .pc .n{position:absolute;top:0;left:1px;font-size:8px;color:#888;font-family:var(--sans);}
  .preview-media{z-index:3;align-self:stretch;justify-self:stretch;overflow:hidden;border:1px solid #1a1a1a;background:#111;
    position:relative;box-shadow:inset 0 0 0 2px rgba(255,255,255,.78),inset 0 0 0 5px rgba(0,0,0,.22),0 1px 2px rgba(0,0,0,.28);}
  .preview-media::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,0) 30%,rgba(0,0,0,.16));}
  .preview-media img{display:block;width:100%;height:100%;object-fit:cover;filter:contrast(1.06) saturate(.92) brightness(1.03);}
  .clue-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .clue-cols h3{font-size:13px;margin:0 0 6px;border-bottom:2px solid #1a1a1a;padding-bottom:3px;}
  .clue-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;}
  .clue-row .lbl{font-size:12px;min-width:26px;font-weight:600;}
  .clue-row .ans-input{flex:0 0 86px;font-family:ui-monospace,Menlo,Consolas,monospace;text-transform:uppercase;}
  .clue-row .clue-input{flex:1;}
  .clue-row input{padding:5px;font-size:13px;}
  .clue-row.answer-missing .ans-input{border-color:var(--err);background:#fff1f1;color:var(--err);font-weight:700;}
  .clue-row.answer-missing .lbl{color:var(--err);}
  #report{font-size:13px;line-height:1.5;}
  #report .e{color:var(--err);} #report .w{color:var(--warn);} #report .ok{color:var(--ok);font-weight:600;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:6px;border-bottom:1px solid var(--line);}
  .pill{font-size:11px;padding:2px 7px;border-radius:20px;border:1px solid var(--line);}
  .pill.scheduled{background:#fff3bf;} .pill.draft{background:#f1f3f5;}
  td a{color:var(--accent);}
  #importIssues{font-size:12px;line-height:1.5;margin-top:6px;}
  #importIssues .i-error{color:var(--err);}
  #importIssues .i-warn{color:var(--warn);}
  #importIssues .i-info{color:var(--muted);}
  #importIssues .i-ok{color:var(--ok);font-weight:600;}
  .file-input{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  .file-picker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .file-button{margin:0;display:inline-flex;align-items:center;min-height:34px;padding:8px 13px;border:1px solid var(--line);
    border-radius:6px;background:#fff;color:var(--ink);font-size:13px;cursor:pointer;}
  .file-button:hover{filter:brightness(.97);}
  .file-name{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
  .media-panel{display:grid;gap:8px;}
  .media-panel .row{gap:8px;}
  .media-nudge{display:grid;grid-template-columns:repeat(3,36px);grid-template-rows:repeat(3,32px);gap:4px;align-items:center;}
  .media-nudge button{width:36px;height:32px;padding:0;font-size:17px;line-height:1;}
  .media-nudge .up{grid-column:2;grid-row:1;}
  .media-nudge .left{grid-column:1;grid-row:2;}
  .media-nudge .right{grid-column:3;grid-row:2;}
  .media-nudge .down{grid-column:2;grid-row:3;}
  .media-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .media-note{font-size:12px;color:var(--muted);min-height:16px;}
  .import-progress{display:none;align-items:center;gap:10px;margin-top:10px;}
  .import-progress.active{display:flex;}
  .progress-track{position:relative;overflow:hidden;flex:1;height:7px;border-radius:999px;background:#ece7dc;}
  .progress-track span{position:absolute;inset:0 auto 0 0;width:44%;border-radius:999px;background:var(--accent);
    animation:import-scan 1.15s ease-in-out infinite;}
  .progress-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:import-pulse .9s ease-in-out infinite;}
  @keyframes import-scan{0%{transform:translateX(-110%);}100%{transform:translateX(240%);}}
  @keyframes import-pulse{0%,100%{opacity:.35;transform:scale(.82);}50%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
  <h1>Günlük Kare Bulmaca — Editör</h1>

  <div class="grid2">
    <div>
      <div class="card">
        <h2>0 · Analiz</h2>
        <div class="file-picker">
          <input class="file-input" type="file" id="imgSolved" accept="image/*">
          <label class="file-button" for="imgSolved">Çözülmüş fotoğraf seç</label>
          <span id="imgSolvedName" class="file-name">Dosya seçilmedi</span>
        </div>
        <div class="btns" style="margin-top:10px"><button id="importBtn">Analiz Et</button></div>
        <div id="importProgress" class="import-progress" aria-live="polite" aria-label="Analiz sürüyor">
          <div class="progress-dot" aria-hidden="true"></div>
          <div class="progress-track" aria-hidden="true"><span></span></div>
          <span id="importProgressText" class="sr-only">Analiz sürüyor</span>
        </div>
        <div id="importStatus" class="sub" style="margin-top:8px"></div>
        <div id="importIssues"></div>
      </div>
      <div class="card">
        <h2>1 · Künye</h2>
        <div class="row">
          <div><label>Yayın tarihi</label><input type="date" id="date"></div>
          <div><label>Bulmaca No</label><input type="text" id="no" placeholder="13"></div>
        </div>
        <label>Başlık</label><input type="text" id="title" value="Günün Kare Bulmacası">
      </div>
      <div class="card">
        <h2>2 · Izgara (çözüm)</h2>
        <textarea id="grid" spellcheck="false">TAM#
E#AY
KASA
#KAR</textarea>
        <div class="btns"><button id="genClues">İpuçlarını oluştur →</button></div>
      </div>
      <div class="card">
        <h2>Görsel</h2>
        <div class="media-panel">
          <div class="file-picker">
            <input class="file-input" type="file" id="mediaImage" accept="image/*">
            <label class="file-button" for="mediaImage">Görsel seç</label>
            <span id="mediaImageName" class="file-name">Dosya seçilmedi</span>
          </div>
          <div class="row">
            <div><label>Satır</label><input type="number" id="mediaRow" min="1" step="1"></div>
            <div><label>Sütun</label><input type="number" id="mediaCol" min="1" step="1"></div>
          </div>
          <div class="row">
            <div><label>Yükseklik</label><input type="number" id="mediaRows" min="1" step="1"></div>
            <div><label>Genişlik</label><input type="number" id="mediaCols" min="1" step="1"></div>
          </div>
          <div class="media-nudge" aria-label="Görsel konumu">
            <button id="mediaUp" class="up" type="button" title="Yukarı" aria-label="Yukarı">↑</button>
            <button id="mediaLeft" class="left" type="button" title="Sola" aria-label="Sola">←</button>
            <button id="mediaRight" class="right" type="button" title="Sağa" aria-label="Sağa">→</button>
            <button id="mediaDown" class="down" type="button" title="Aşağı" aria-label="Aşağı">↓</button>
          </div>
          <div class="media-actions">
            <button id="mediaAuto" type="button">Siyah alana yerleştir</button>
            <button id="mediaClear" type="button">Temizle</button>
          </div>
          <div id="mediaStatus" class="media-note"></div>
        </div>
      </div>
      <div class="card">
        <h2>Kayıtlı bulmacalar</h2>
        <table id="list"><tbody><tr><td class="sub">Yükleniyor…</td></tr></tbody></table>
      </div>
    </div>
    <div>
      <div class="card"><h2>Önizleme</h2><div id="previewGrid" class="preview-grid"></div>
        <div class="btns"><a id="openPlayer" href="#" target="_blank"><button>Oyuncu önizlemesi</button></a></div></div>
      <div class="card">
        <h2>3 · İpuçları</h2>
        <div class="clue-cols">
          <div><h3>Soldan Sağa</h3><div id="acrossClues"></div></div>
          <div><h3>Yukarıdan Aşağıya</h3><div id="downClues"></div></div>
        </div>
      </div>
      <div class="card">
        <h2>4 · Doğrula & Yayınla</h2>
        <div id="report" class="sub">Henüz doğrulanmadı.</div>
        <div class="btns">
          <button id="validate">Doğrula</button>
          <button id="saveDraft">Taslak Kaydet</button>
          <button id="schedule" class="primary">Yayına Planla</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./admin.js"></script>
</body>
</html>
